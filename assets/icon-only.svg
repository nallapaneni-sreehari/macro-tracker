<svg width="100%" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#13112a"/>
      <stop offset="100%" stop-color="#0f0e1a"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6C5CE7"/>
      <stop offset="100%" stop-color="#a29bfe"/>
    </linearGradient>
    <linearGradient id="ringGrad2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a29bfe"/>
      <stop offset="100%" stop-color="#7c6ff0"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a29bfe"/>
      <stop offset="100%" stop-color="#6C5CE7"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6C5CE7" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#6C5CE7" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="coralGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="subtleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="iconClip">
      <rect x="100" y="100" width="480" height="480" rx="108"/>
    </clipPath>
  </defs>

  <!-- App icon background -->
  <rect x="100" y="100" width="480" height="480" rx="108" fill="url(#bgGrad)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:20px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Subtle inner glow background circle -->
  <circle cx="340" cy="340" r="210" fill="url(#glowGrad)" clip-path="url(#iconClip)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:20px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Outer glow ring (purple ambient) -->
  <circle cx="340" cy="340" r="162" fill="none" stroke="#6C5CE7" stroke-width="28" stroke-opacity="0.12" clip-path="url(#iconClip)" style="fill:none;stroke:rgb(108, 92, 231);color:rgb(255, 255, 255);stroke-width:28px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:20px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Track ring (dimmed background) -->
  <circle cx="340" cy="340" r="162" fill="none" stroke="#a29bfe" stroke-width="22" stroke-opacity="0.10" clip-path="url(#iconClip)" style="fill:none;stroke:rgb(162, 155, 254);color:rgb(255, 255, 255);stroke-width:22px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:20px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Main progress ring arc — ~290° coverage (left gap at bottom-left) -->
  <!-- circumference ≈ 1018. 290deg arc ≈ 818 of that -->
  <circle cx="340" cy="340" r="162" fill="none" stroke="url(#ringGrad)" stroke-width="22" stroke-linecap="round" stroke-dasharray="818 1018" stroke-dashoffset="-65" transform="rotate(-110 340 340)" clip-path="url(#iconClip)" filter="url(#subtleGlow)" style="fill:none;color:rgb(255, 255, 255);stroke-width:22px;stroke-dasharray:818px, 1018px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:20px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Second arc segment (lighter, gives depth / second macro ring effect) -->
  <circle cx="340" cy="340" r="162" fill="none" stroke="url(#ringGrad2)" stroke-width="22" stroke-linecap="round" stroke-dasharray="480 1018" stroke-dashoffset="-65" transform="rotate(-110 340 340)" stroke-opacity="0.35" clip-path="url(#iconClip)" style="fill:none;color:rgb(255, 255, 255);stroke-width:22px;stroke-dasharray:480px, 1018px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:20px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Inner secondary ring (thinner, offset) -->
  <circle cx="340" cy="340" r="130" fill="none" stroke="#a29bfe" stroke-width="7" stroke-linecap="round" stroke-dasharray="560 817" stroke-dashoffset="-30" transform="rotate(-95 340 340)" stroke-opacity="0.28" clip-path="url(#iconClip)" style="fill:none;stroke:rgb(162, 155, 254);color:rgb(255, 255, 255);stroke-width:7px;stroke-dasharray:560px, 817px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:20px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Leaf / fork icon group centered in the ring -->
  <!-- Stylized leaf: a smooth teardrop shape -->
  <g filter="url(#softGlow)" clip-path="url(#iconClip)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:20px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <!-- Leaf body -->
    <path d="M340 230&#10;             C310 250, 285 285, 288 318&#10;             C291 352, 315 378, 340 390&#10;             C365 378, 389 352, 392 318&#10;             C395 285, 370 250, 340 230 Z" fill="url(#leafGrad)" opacity="0.96" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.96;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:20px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Leaf midrib (center vein) -->
    <line x1="340" y1="238" x2="340" y2="382" stroke="#0f0e1a" stroke-width="3" stroke-linecap="round" opacity="0.55" style="fill:rgb(0, 0, 0);stroke:rgb(15, 14, 26);color:rgb(255, 255, 255);stroke-width:3px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.55;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:20px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Leaf lateral veins -->
    <path d="M340 275 Q322 270 310 265" stroke="#0f0e1a" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.35" style="fill:none;stroke:rgb(15, 14, 26);color:rgb(255, 255, 255);stroke-width:1.8px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.35;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:20px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <path d="M340 300 Q317 294 303 287" stroke="#0f0e1a" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.35" style="fill:none;stroke:rgb(15, 14, 26);color:rgb(255, 255, 255);stroke-width:1.8px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.35;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:20px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <path d="M340 325 Q318 320 307 314" stroke="#0f0e1a" stroke-width="1.6" stroke-linecap="round" fill="none" opacity="0.3" style="fill:none;stroke:rgb(15, 14, 26);color:rgb(255, 255, 255);stroke-width:1.6px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.3;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:20px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <path d="M340 275 Q358 270 370 265" stroke="#0f0e1a" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.35" style="fill:none;stroke:rgb(15, 14, 26);color:rgb(255, 255, 255);stroke-width:1.8px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.35;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:20px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <path d="M340 300 Q363 294 377 287" stroke="#0f0e1a" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.35" style="fill:none;stroke:rgb(15, 14, 26);color:rgb(255, 255, 255);stroke-width:1.8px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.35;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:20px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <path d="M340 325 Q362 320 373 314" stroke="#0f0e1a" stroke-width="1.6" stroke-linecap="round" fill="none" opacity="0.3" style="fill:none;stroke:rgb(15, 14, 26);color:rgb(255, 255, 255);stroke-width:1.6px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.3;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:20px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  </g>

  <!-- Coral accent dot — top-right end of progress arc -->
  <circle cx="446" cy="221" r="18" fill="#e17055" filter="url(#coralGlow)" clip-path="url(#iconClip)" style="fill:rgb(225, 112, 85);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:20px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Coral dot inner highlight -->
  <circle cx="441" cy="216" r="6" fill="#f5a08a" opacity="0.7" clip-path="url(#iconClip)" style="fill:rgb(245, 160, 138);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.7;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:20px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Coral micro dot (arc start indicator bottom area) -->
  <circle cx="234" cy="222" r="9" fill="#e17055" opacity="0.55" clip-path="url(#iconClip)" style="fill:rgb(225, 112, 85);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.55;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:20px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Icon border / frame -->
  <rect x="100" y="100" width="480" height="480" rx="108" fill="none" stroke="#a29bfe" stroke-width="1.5" stroke-opacity="0.18" style="fill:none;stroke:rgb(162, 155, 254);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:20px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
</svg>