<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Goals</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-card>
    <ion-card-header>
      <ion-card-title>Daily Macro Goals</ion-card-title>
      <ion-card-subtitle>Set your daily nutrition targets</ion-card-subtitle>
    </ion-card-header>
    <ion-card-content>
      <ion-list>
        <ion-item>
          <ion-icon name="flame-outline" slot="start" color="danger"></ion-icon>
          <ion-input label="Calories (kcal)" labelPlacement="stacked" type="number" [(ngModel)]="goals.calories" placeholder="2000"></ion-input>
        </ion-item>
        <ion-item>
          <ion-icon name="fish-outline" slot="start" color="success"></ion-icon>
          <ion-input label="Protein (g)" labelPlacement="stacked" type="number" [(ngModel)]="goals.protein" placeholder="150"></ion-input>
        </ion-item>
        <ion-item>
          <ion-icon name="leaf-outline" slot="start" color="warning"></ion-icon>
          <ion-input label="Carbs (g)" labelPlacement="stacked" type="number" [(ngModel)]="goals.carbs" placeholder="250"></ion-input>
        </ion-item>
        <ion-item>
          <ion-icon name="water-outline" slot="start" color="tertiary"></ion-icon>
          <ion-input label="Fat (g)" labelPlacement="stacked" type="number" [(ngModel)]="goals.fat" placeholder="65"></ion-input>
        </ion-item>
        <ion-item>
          <ion-icon name="nutrition-outline" slot="start" color="medium"></ion-icon>
          <ion-input label="Fiber (g)" labelPlacement="stacked" type="number" [(ngModel)]="goals.fiber" placeholder="30"></ion-input>
        </ion-item>
      </ion-list>
    </ion-card-content>
  </ion-card>

  <div class="save-area">
    <ion-button expand="block" (click)="saveGoals()">
      <ion-icon name="save-outline" slot="start"></ion-icon>
      Save Goals
    </ion-button>
  </div>

  <ion-card>
    <ion-card-header>
      <ion-card-title>Quick Presets</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-button expand="block" fill="outline" (click)="goals = { calories: 1500, protein: 130, carbs: 150, fat: 50, fiber: 25 }">
        Weight Loss (1500 cal)
      </ion-button>
      <ion-button expand="block" fill="outline" (click)="goals = { calories: 2000, protein: 150, carbs: 250, fat: 65, fiber: 30 }">
        Maintenance (2000 cal)
      </ion-button>
      <ion-button expand="block" fill="outline" (click)="goals = { calories: 2800, protein: 200, carbs: 350, fat: 80, fiber: 35 }">
        Muscle Gain (2800 cal)
      </ion-button>
      <ion-button expand="block" fill="outline" (click)="goals = { calories: 3500, protein: 250, carbs: 450, fat: 100, fiber: 40 }">
        Bulking (3500 cal)
      </ion-button>
    </ion-card-content>
  </ion-card>
</ion-content>
